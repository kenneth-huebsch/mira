services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    user: root
    entrypoint: ["/entrypoint.sh"]
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      N8N_API_KEY: ${N8N_API_KEY:-}
      N8N_BASE_URL: ${N8N_BASE_URL:-}
      WORDPRESS_BASE_URL: ${WORDPRESS_BASE_URL:-}
      WORDPRESS_USERNAME: ${WORDPRESS_USERNAME:-}
      WORDPRESS_APP_PASSWORD: ${WORDPRESS_APP_PASSWORD:-}
      OPENCLAW_DEBUG_TELEGRAM_INGRESS: ${OPENCLAW_DEBUG_TELEGRAM_INGRESS:-}
      OPENCLAW_VERBOSE: ${OPENCLAW_VERBOSE:-}
      GOG_KEYRING_BACKEND: ${GOG_KEYRING_BACKEND:-file}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-}
      XDG_CONFIG_HOME: ${XDG_CONFIG_HOME:-/home/node/.openclaw}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ./entrypoint.sh:/entrypoint.sh:ro
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## scripts/docker/setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      - "${OPENCLAW_UI_PORT:-3501}:3500"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    user: root
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      N8N_API_KEY: ${N8N_API_KEY:-}
      N8N_BASE_URL: ${N8N_BASE_URL:-}
      OPENCLAW_DEBUG_TELEGRAM_INGRESS: ${OPENCLAW_DEBUG_TELEGRAM_INGRESS:-}
      OPENCLAW_VERBOSE: ${OPENCLAW_VERBOSE:-}
      GOG_KEYRING_BACKEND: ${GOG_KEYRING_BACKEND:-file}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-}
      XDG_CONFIG_HOME: ${XDG_CONFIG_HOME:-/home/node/.openclaw}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ./entrypoint.sh:/entrypoint.sh:ro
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["/entrypoint.sh", "node", "dist/index.js"]
    depends_on:
      - openclaw-gateway
